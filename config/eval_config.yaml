# MiMo-V2-Pro 专项评测配置
# 基于文章提到的能力维度设计

evaluation:
  name: "MiMo-V2-Pro-Capability-Evaluation"
  version: "1.0.0"
  description: "针对 Xiaomi MiMo-V2-Pro 各维度能力的客观评测"

# 评测维度配置
dimensions:
  reasoning:
    name: "复杂推理能力"
    description: "数学推理、逻辑推理、科学问题求解"
    weight: 0.25
    benchmarks:
      - gsm8k          # 数学文字题
      - math           # 竞赛数学
      - gpqa           # 研究生级别科学问答
      - mmlu_pro       # 专业领域理解

  coding:
    name: "编程能力"
    description: "代码生成、代码理解、Vibe Coding"
    weight: 0.25
    benchmarks:
      - humaneval      # 函数级代码生成
      - mbpp           # Python 编程问题
      - livecodebench  # 实时竞赛编程
      - swe_bench      # 真实软件工程任务

  agent:
    name: "Agent 能力"
    description: "工具使用、多步骤规划、任务完成"
    weight: 0.30
    benchmarks:
      - openclaw       # 文章中提到的评测框架
      - webarena       # 网页操作任务
      - tool_use       # 工具调用准确性
      - multi_step     # 多步骤任务完成率

  long_context:
    name: "长上下文理解"
    description: "25M 上下文窗口的有效利用"
    weight: 0.10
    benchmarks:
      - needle_in_haystack    # 大海捞针测试
      - long_qa               # 长文档问答
      - code_repo_understanding # 代码库理解

  instruction_following:
    name: "指令遵循"
    description: "准确理解并执行复杂指令"
    weight: 0.10
    benchmarks:
      - ifeval           # 指令遵循评估
      - complex_prompts  # 复杂提示词测试

# 模型配置
models:
  mimo_v2_pro:
    name: "Xiaomi MiMo-V2-Pro"
    api_base: "https://api.xiaomimimo.com/v1"
    model_id: "mimo-v2-pro"
    max_tokens: 8192
    temperature: 0.0
    top_p: 0.95
    supports_tools: true
    context_length: 25000000
    env_key: "MIMO_API_KEY"  # 环境变量名
    # API密钥通过环境变量 MIMO_API_KEY 提供

  # 对比模型
  qwen35_plus:
    name: "阿里云 Qwen3.5-Plus"
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_id: "qwen-plus"  # 或 qwen3.5-plus，根据实际可用模型调整
    max_tokens: 8192
    temperature: 0.0
    supports_tools: true
    context_length: 32000
    env_key: "DASHSCOPE_API_KEY"  # 阿里云 DashScope 环境变量名
    # API密钥通过环境变量 DASHSCOPE_API_KEY 提供

# 评测参数
settings:
  parallel_requests: 5
  retry_attempts: 3
  timeout_seconds: 120
  output_dir: "./results"
  save_intermediate: true
