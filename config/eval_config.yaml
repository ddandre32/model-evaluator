# MiMo-V2-Pro 专项评测配置
# 基于文章提到的能力维度设计

evaluation:
  name: "MiMo-V2-Pro-Capability-Evaluation"
  version: "1.0.0"
  description: "针对 Xiaomi MiMo-V2-Pro 各维度能力的客观评测"

# 评测维度配置
dimensions:
  reasoning:
    name: "复杂推理能力"
    description: "数学推理、逻辑推理、科学问题求解"
    weight: 0.25
    benchmarks:
      - gsm8k          # 数学文字题
      - math           # 竞赛数学
      - gpqa           # 研究生级别科学问答
      - mmlu_pro       # 专业领域理解

  coding:
    name: "编程能力"
    description: "代码生成、代码理解、Vibe Coding"
    weight: 0.25
    benchmarks:
      - humaneval      # 函数级代码生成
      - mbpp           # Python 编程问题
      - livecodebench  # 实时竞赛编程
      - swe_bench      # 真实软件工程任务

  agent:
    name: "Agent 能力"
    description: "工具使用、多步骤规划、任务完成、智能家居语义解析"
    weight: 0.30
    benchmarks:
      - openclaw       # 文章中提到的评测框架
      - webarena       # 网页操作任务
      - tool_use       # 工具调用准确性
      - multi_step     # 多步骤任务完成率
      - smarthome      # 智能家居语义解析

  long_context:
    name: "长上下文理解"
    description: "25M 上下文窗口的有效利用"
    weight: 0.10
    benchmarks:
      - needle_in_haystack    # 大海捞针测试
      - long_qa               # 长文档问答
      - code_repo_understanding # 代码库理解

  instruction_following:
    name: "指令遵循"
    description: "准确理解并执行复杂指令"
    weight: 0.10
    benchmarks:
      - ifeval           # 指令遵循评估
      - complex_prompts  # 复杂提示词测试

# 模型配置
models:
  mimo_v2_pro:
    name: "Xiaomi MiMo-V2-Pro"
    api_base: "https://api.xiaomimimo.com/v1"
    model_id: "mimo-v2-pro"
    # 核心参数 - 优化性能
    max_tokens: 4096              # 平衡性能和成本，支持最大4096
    temperature: 0.0            # 确定性输出，适合评测
    top_p: 0.95                 # 保持一定多样性，但主要取高概率token
    top_k: 50                   # 限制候选token数量
    # 重复惩罚 - 防止模型重复
    presence_penalty: 0.0       # 不惩罚新话题
    frequency_penalty: 0.0      # 不惩罚重复词
    # 上下文配置
    context_length: 25000000    # 25M 长上下文
    supports_tools: true
    # 评测特定配置
    reasoning_params:
      temperature: 0.0          # 推理需要确定性
      max_tokens: 2048
    coding_params:
      temperature: 0.2          # 代码生成需要一点创造性
      max_tokens: 4096
    agent_params:
      temperature: 0.0          # Agent需要精确
      max_tokens: 2048
    env_key: "MIMO_API_KEY"

  # 对比模型 - Qwen3.5-Plus (最强配置)
  qwen35_plus:
    name: "阿里云 Qwen3.5-Plus"
    api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    model_id: "qwen-max"        # 使用最强版本 qwen-max 替代 qwen-plus
    # 核心参数 - 优化性能
    max_tokens: 8192            # Qwen支持8K输出
    temperature: 0.0            # 确定性输出
    top_p: 0.95
    top_k: 50
    # 重复惩罚
    presence_penalty: 0.0
    frequency_penalty: 0.0
    # 上下文配置 - 最强支持
    context_length: 32000       # 32K 上下文
    supports_tools: true
    # 启用搜索增强（Qwen特有）
    enable_search: false        # 评测时关闭，避免外部干扰
    # 评测特定配置
    reasoning_params:
      temperature: 0.0
      max_tokens: 4096
    coding_params:
      temperature: 0.2
      max_tokens: 8192
    agent_params:
      temperature: 0.0
      max_tokens: 4096
    env_key: "DASHSCOPE_API_KEY"

# 评测参数
settings:
  parallel_requests: 5
  retry_attempts: 3
  timeout_seconds: 120
  output_dir: "./results"
  save_intermediate: true
